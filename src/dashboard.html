<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open Dynamic Workflows · 控制台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #ffffff;
        --ink: #111111;
        --muted: #707070;
        --line: #e8e8e8;
        --soft-line: #f3f3f3;
        --node-border: #d7d7d7;
        --node-active: #111111;
        --green: #10b981;
        --amber: #f59e0b;
        --red: #ef4444;
        --grid: rgba(0, 0, 0, 0.035);
        --sans: "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --soft: "Gaegu", "Inter", cursive;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        overflow: hidden;
        background: var(--bg);
        color: var(--ink);
        font-family: var(--sans);
        -webkit-font-smoothing: antialiased;
      }
      button { font: inherit; cursor: pointer; }
      .page { min-height: 100dvh; display: grid; grid-template-columns: 340px minmax(0, 1fr); background: #fff; }

      /* ---- sidebar ---- */
      .sidebar {
        min-height: 100dvh;
        max-height: 100dvh;
        overflow-y: auto;
        padding: 30px 24px;
        border-right: 1px solid var(--line);
        display: flex;
        flex-direction: column;
      }
      .brand { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 30px; }
      .brand-name { max-width: 220px; font-family: var(--soft); font-size: 30px; font-weight: 700; line-height: 0.9; }
      .brand-sub { margin-top: 6px; font-size: 11px; color: var(--muted); }
      .live-pill { display: inline-flex; align-items: center; gap: 7px; color: #666; font-size: 12px; white-space: nowrap; }
      .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 1.8s infinite; }
      .live-dot.off { background: #c9c9c9; animation: none; }

      .section-label { color: var(--muted); font-size: 12px; margin: 22px 0 12px; display: flex; justify-content: space-between; }
      .flow-list { display: grid; gap: 10px; }
      .flow {
        width: 100%; border: 1px solid var(--line); background: #fff; border-radius: 12px;
        padding: 13px 14px; text-align: left; transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
      }
      .flow:hover { transform: translateY(-2px); }
      .flow.active { border-color: #111; box-shadow: rgba(0,0,0,.05) 0 10px 24px; }
      .flow.ended { background: #fcfcfc; }
      .flow-title { display: flex; justify-content: space-between; align-items: center; gap: 10px; font-size: 15px; font-weight: 700; }
      .flow-title span:first-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .flow-meta { margin-top: 7px; color: var(--muted); font-size: 12.5px; }
      .flow-strip { display: block; margin-top: 12px; height: 6px; overflow: hidden; border-radius: 999px; background: #eee; }
      .flow-strip span { display: block; height: 100%; background: #111; opacity: .72; transition: width .3s ease; }
      .empty-hint { color: var(--muted); font-size: 13px; line-height: 1.6; border: 1px dashed var(--line); border-radius: 12px; padding: 16px; }
      .empty-hint code { font-family: ui-monospace, Menlo, monospace; background: #f4f4f4; padding: 1px 6px; border-radius: 5px; font-size: 12px; }

      .summary { margin-top: auto; padding-top: 24px; }
      .summary-row { display: flex; justify-content: space-between; border-top: 1px solid var(--soft-line); padding-top: 11px; color: var(--muted); font-size: 13px; }
      .summary-row strong { color: var(--ink); }

      /* ---- badges ---- */
      .badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; font-weight: 600; padding: 2px 9px; border-radius: 999px; border: 1px solid var(--line); color: #555; white-space: nowrap; }
      .badge .d { width: 6px; height: 6px; border-radius: 50%; background: #bbb; }
      .badge.running { color: #0a7d57; border-color: #bfe6d5; background: #f0fbf6; } .badge.running .d { background: var(--green); }
      .badge.pending, .badge.paused { color: #92610c; border-color: #f3e2bd; background: #fdf8ee; } .badge.pending .d, .badge.paused .d { background: var(--amber); }
      .badge.stale { color: #9a3412; border-color: #f6d4bd; background: #fdf1ea; } .badge.stale .d { background: #f97316; }
      .badge.failed { color: #b42318; border-color: #f4c7c2; background: #fdf1f0; } .badge.failed .d { background: var(--red); }
      .badge.done, .badge.stopped { color: #555; }

      /* ---- stage / canvas ---- */
      .stage {
        position: relative; min-height: 100dvh; max-height: 100dvh; overflow: hidden; display: flex; flex-direction: column;
        background: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px), #fff;
        background-size: 34px 34px;
      }
      .stage-head { padding: 26px 34px 18px; border-bottom: 1px solid var(--soft-line); }
      .stage-title-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
      .stage-title { font-size: 22px; font-weight: 700; }
      .stage-desc { margin-top: 7px; color: var(--muted); font-size: 13.5px; max-width: 70ch; }
      .chips { margin-top: 14px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      .chip { font-size: 12px; color: #555; border: 1px solid var(--line); border-radius: 999px; padding: 3px 11px; }
      .chip b { color: #111; }
      .spacer { flex: 1; }
      .ctrl { border: 1px solid var(--node-border); background: #fff; border-radius: 9px; padding: 6px 13px; font-size: 13px; font-weight: 600; color: #333; }
      .ctrl:hover { border-color: #111; }
      .ctrl.stop:hover { border-color: var(--red); color: var(--red); }
      .ctrl:disabled { opacity: .4; cursor: default; }

      .lanes-wrap { flex: 1; overflow: auto; padding: 26px 34px 60px; }
      .lanes { display: flex; gap: 0; align-items: stretch; min-height: 100%; }
      .lane { min-width: 230px; max-width: 280px; display: flex; flex-direction: column; }
      .lane + .lane { margin-left: 26px; position: relative; }
      .lane + .lane::before { content: "→"; position: absolute; left: -22px; top: 9px; color: #cfcfcf; font-size: 16px; }
      .lane-head { font-size: 13px; font-weight: 700; color: #333; display: flex; justify-content: space-between; align-items: baseline; gap: 8px; padding-bottom: 4px; border-bottom: 1px solid var(--line); }
      .lane-head .n { color: var(--muted); font-weight: 500; font-size: 12px; }
      .lane-body { margin-top: 14px; display: grid; gap: 12px; align-content: start; }
      .lane-empty { color: #bbb; font-size: 12px; padding: 10px 0; }

      .node {
        position: relative; border: 1px solid var(--node-border); border-radius: 9px; padding: 11px 12px;
        background: rgba(255,255,255,.94); box-shadow: rgba(0,0,0,.03) 0 8px 20px; transition: transform .2s ease, border-color .2s ease;
      }
      .node:hover { transform: translateY(-2px); border-color: var(--node-active); }
      .node.running { border-color: #bfe6d5; }
      .node.failed { border-color: #f4c7c2; }
      .node h3 { margin: 0; padding-right: 16px; font-size: 13.5px; line-height: 1.25; word-break: break-word; }
      .node .sub { margin-top: 6px; color: #777; font-size: 11px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      .node .sub .err { color: var(--red); }
      .node .dot { position: absolute; top: 13px; right: 12px; width: 7px; height: 7px; border-radius: 50%; background: #cfcfcf; }
      .node.running .dot { background: var(--green); box-shadow: 0 0 0 4px rgba(16,185,129,.10); animation: pulse 1.8s infinite; }
      .node.failed .dot { background: var(--red); }
      .node.done .dot { background: #c0c0c0; }

      .stage-foot { position: absolute; left: 34px; right: 34px; bottom: 20px; color: var(--muted); font-size: 12.5px; display: flex; justify-content: space-between; gap: 16px; pointer-events: none; }
      .placeholder { flex: 1; display: flex; align-items: center; justify-content: center; color: #b8b8b8; font-size: 14px; }

      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(16,185,129,.38); }
        70% { box-shadow: 0 0 0 9px rgba(16,185,129,0); }
        100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
      }
      @media (max-width: 980px) {
        body { overflow: auto; }
        .page { grid-template-columns: 1fr; }
        .sidebar, .stage { min-height: auto; max-height: none; }
        .stage { height: 720px; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <aside class="sidebar">
        <div class="brand">
          <div>
            <div class="brand-name">Open Dynamic Workflows</div>
            <div class="brand-sub" id="rootLabel">控制台</div>
          </div>
          <div class="live-pill"><span class="live-dot" id="connDot"></span><span id="connText">连接中</span></div>
        </div>

        <div class="section-label"><span>运行中</span><span id="activeCount"></span></div>
        <div class="flow-list" id="activeList"></div>

        <div class="section-label"><span>已结束</span><span id="endedCount"></span></div>
        <div class="flow-list" id="endedList"></div>

        <div class="summary" id="summary"></div>
      </aside>

      <section class="stage" aria-label="工作流画布">
        <div id="stageContent">
          <div class="placeholder" id="placeholder" style="min-height: 100dvh;">还没有可显示的工作流</div>
        </div>
      </section>
    </main>

    <script>
      const STATE = {
        running: { label: "运行中", cls: "running", active: true },
        pending: { label: "等待中", cls: "pending", active: true },
        paused: { label: "已暂停", cls: "paused", active: true },
        done: { label: "完成", cls: "done", active: false },
        failed: { label: "失败", cls: "failed", active: false },
        stopped: { label: "已停止", cls: "stopped", active: false },
        stale: { label: "失联", cls: "stale", active: false },
      };
      const sm = (s) => STATE[s] || { label: s, cls: "", active: false };

      let runs = [];
      let selectedId = null;
      let detail = null;

      const $ = (id) => document.getElementById(id);
      const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

      function fmtDuration(ms) {
        if (ms == null) return "";
        const s = ms / 1000;
        if (s < 1) return Math.round(ms) + "ms";
        if (s < 60) return s.toFixed(s < 10 ? 1 : 0) + "s";
        const m = Math.floor(s / 60);
        return m + "m" + String(Math.round(s % 60)).padStart(2, "0") + "s";
      }
      function fmtAgo(tsSec) {
        if (!tsSec) return "";
        const d = Date.now() / 1000 - tsSec;
        if (d < 5) return "刚刚";
        if (d < 60) return Math.floor(d) + " 秒前";
        if (d < 3600) return Math.floor(d / 60) + " 分钟前";
        return Math.floor(d / 3600) + " 小时前";
      }
      function badge(state) {
        const m = sm(state);
        return `<span class="badge ${m.cls}"><span class="d"></span>${m.label}</span>`;
      }

      function renderSidebar() {
        const active = runs.filter((r) => sm(r.state).active);
        const ended = runs.filter((r) => !sm(r.state).active);
        $("activeCount").textContent = active.length || "";
        $("endedCount").textContent = ended.length || "";

        if (runs.length === 0) {
          $("activeList").innerHTML = "";
          $("endedList").innerHTML = `<div class="empty-hint">还没有任何运行。<br />在任意项目里跑一个工作流：<br /><code>odw run workflow.js</code><br />它会自动出现在这里。</div>`;
        } else {
          $("activeList").innerHTML =
            active.map(activeCard).join("") || `<div class="empty-hint">当前没有正在运行的工作流。</div>`;
          $("endedList").innerHTML = ended.map(endedCard).join("");
        }

        document.querySelectorAll(".flow[data-id]").forEach((el) => {
          el.addEventListener("click", () => select(el.dataset.id));
        });

        $("summary").innerHTML = `
          <div class="summary-row"><span>运行中</span><strong>${active.filter((r) => r.state === "running").length}</strong></div>
          <div class="summary-row"><span>全部</span><strong>${runs.length}</strong></div>`;
      }

      function metaLine(r, withProgress) {
        const phases = (r.phases && r.phases.length) || 0;
        const parts = [];
        if (phases) parts.push(phases + " 阶段");
        parts.push(r.counts.agents + " 个 agent");
        if (withProgress && r.counts.agents > 0) parts.push(Math.round(r.progress * 100) + "%");
        return parts.join(" · ");
      }
      function activeCard(r) {
        const pct = r.counts.agents > 0 ? Math.round(r.progress * 100) : 0;
        return `<button class="flow ${r.runId === selectedId ? "active" : ""}" data-id="${esc(r.runId)}" type="button">
            <div class="flow-title"><span>${esc(r.name)}</span>${badge(r.state)}</div>
            <div class="flow-meta">${metaLine(r, true)}</div>
            <div class="flow-strip"><span style="width:${pct}%"></span></div>
          </button>`;
      }
      function endedCard(r) {
        return `<button class="flow ended ${r.runId === selectedId ? "active" : ""}" data-id="${esc(r.runId)}" type="button">
            <div class="flow-title"><span>${esc(r.name)}</span>${badge(r.state)}</div>
            <div class="flow-meta">${metaLine(r, false)}</div>
          </button>`;
      }

      function renderStage() {
        const host = $("stageContent");
        if (!detail) {
          host.innerHTML = `<div class="placeholder" style="min-height: 100dvh;">${runs.length ? "选择左侧的一个工作流查看详情" : "还没有可显示的工作流 — 运行 odw run &lt;script.js&gt;"}</div>`;
          return;
        }
        const d = detail;
        const canControl = d.state === "running" || d.state === "paused";
        const controls = canControl
          ? `<button class="ctrl" data-act="${d.state === "paused" ? "resume" : "pause"}">${d.state === "paused" ? "继续" : "暂停"}</button>
             <button class="ctrl stop" data-act="stop">停止</button>`
          : "";

        // group agents by phase; agents with no phase fall into "其他"
        const order = d.phaseOrder && d.phaseOrder.length ? d.phaseOrder.slice() : [];
        const byPhase = new Map();
        for (const p of order) byPhase.set(p, []);
        for (const a of d.agents) {
          const key = a.phase || "—";
          if (!byPhase.has(key)) { byPhase.set(key, []); if (!order.includes(key)) order.push(key); }
          byPhase.get(key).push(a);
        }
        if (order.length === 0) order.push("Agents"), byPhase.set("Agents", d.agents.slice());

        const lanes = order
          .map((p) => {
            const list = byPhase.get(p) || [];
            const body = list.length
              ? list.map(nodeCard).join("")
              : `<div class="lane-empty">等待 agent…</div>`;
            return `<div class="lane"><div class="lane-head"><span>${esc(p)}</span><span class="n">${list.length || ""}</span></div><div class="lane-body">${body}</div></div>`;
          })
          .join("");

        const c = d.counts;
        const errLine = d.state === "failed" && d.error ? ` · <span style="color:var(--red)">${esc(d.error.error || "失败")}</span>` : "";

        host.innerHTML = `
          <div class="stage-head">
            <div class="stage-title-row">
              <div class="stage-title">${esc(d.name)}</div>
              ${badge(d.state)}
              <div class="spacer"></div>
              ${controls}
            </div>
            ${d.description ? `<div class="stage-desc">${esc(d.description)}</div>` : ""}
            <div class="chips">
              <span class="chip"><b>${c.agents}</b> agent</span>
              <span class="chip"><b>${c.running}</b> 运行</span>
              <span class="chip"><b>${c.done}</b> 完成</span>
              ${c.failed ? `<span class="chip"><b>${c.failed}</b> 失败</span>` : ""}
              ${(d.phases && d.phases.length) ? `<span class="chip"><b>${d.phases.length}</b> 阶段</span>` : ""}
            </div>
          </div>
          <div class="lanes-wrap"><div class="lanes">${lanes}</div></div>
          <div class="stage-foot">
            <span>${c.running} 个 agent 活跃，${c.done} 个已完成${c.failed ? `，${c.failed} 个失败` : ""}${errLine}</span>
            <span>${d.stale ? "⚠ worker 已失联（进程不在）" : "最近活动 " + (fmtAgo(d.lastActivityTs) || "—")}</span>
          </div>`;

        host.querySelectorAll(".ctrl[data-act]").forEach((b) =>
          b.addEventListener("click", () => control(d.runId, b.dataset.act)),
        );
      }

      function nodeCard(a) {
        const sub = [];
        if (a.adapter) sub.push(esc(a.adapter));
        if (a.attempts && a.attempts > 1) sub.push(a.attempts + " 次尝试");
        if (a.state === "running") sub.push("运行中…");
        else if (a.durationMs != null) sub.push(fmtDuration(a.durationMs));
        if (a.state === "failed" && a.error) sub.push(`<span class="err">${esc(a.error).slice(0, 80)}</span>`);
        return `<div class="node ${a.state}"><span class="dot"></span><h3>${esc(a.label)}</h3><div class="sub">${sub.join("<span>·</span>")}</div></div>`;
      }

      function select(id) {
        selectedId = id;
        renderSidebar();
        loadDetail(id);
      }

      async function loadRuns() {
        try {
          const r = await fetch("/api/runs");
          runs = await r.json();
        } catch { return; }
        if (!selectedId && runs.length) {
          const firstActive = runs.find((x) => sm(x.state).active);
          selectedId = (firstActive || runs[0]).runId;
          loadDetail(selectedId);
        } else if (selectedId && !runs.some((x) => x.runId === selectedId)) {
          selectedId = runs.length ? runs[0].runId : null;
          detail = null;
          if (selectedId) loadDetail(selectedId);
        }
        renderSidebar();
      }
      async function loadDetail(id) {
        if (!id) { detail = null; renderStage(); return; }
        try {
          const r = await fetch("/api/runs/" + encodeURIComponent(id));
          if (!r.ok) { detail = null; renderStage(); return; }
          detail = await r.json();
        } catch { return; }
        renderStage();
      }
      async function control(id, action) {
        try {
          await fetch("/api/runs/" + encodeURIComponent(id) + "/control", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ action }),
          });
        } catch {}
        setTimeout(() => { loadRuns(); loadDetail(id); }, 250);
      }

      function setConn(ok) {
        $("connDot").className = "live-dot" + (ok ? "" : " off");
        $("connText").textContent = ok ? "实时" : "轮询";
      }

      // Live updates via SSE, with a polling fallback if the stream drops.
      let pollTimer = null;
      function startPolling() {
        if (pollTimer) return;
        setConn(false);
        pollTimer = setInterval(() => { loadRuns(); if (selectedId) loadDetail(selectedId); }, 2000);
      }
      function connect() {
        try {
          const es = new EventSource("/api/stream");
          es.addEventListener("open", () => { setConn(true); if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } });
          es.addEventListener("runs", (e) => {
            try { runs = JSON.parse(e.data); } catch { return; }
            if (!selectedId && runs.length) {
              const fa = runs.find((x) => sm(x.state).active);
              selectedId = (fa || runs[0]).runId;
              loadDetail(selectedId);
            }
            renderSidebar();
            if (selectedId && runs.some((x) => x.runId === selectedId)) loadDetail(selectedId);
          });
          es.addEventListener("error", () => { startPolling(); });
        } catch {
          startPolling();
        }
      }

      loadRuns();
      connect();
    </script>
  </body>
</html>
